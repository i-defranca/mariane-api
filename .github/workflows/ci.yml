name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.filter.outputs.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python_version:
              - '.python-version'

  test:
    runs-on: ubuntu-latest
    needs: changes

    env:
      DB_HOST: 127.0.0.1
      DB_DATABASE: testdb
      DB_USERNAME: root
      DB_PASSWORD: rootpwd
    services:
      mysql:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: testdb
          MYSQL_USER: mysql
          MYSQL_PASSWORD: mysql
          MYSQL_ROOT_PASSWORD: rootpwd
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up SECRET_KEY
        env:
          DJANGO_SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          echo "SECRET_KEY=${DJANGO_SECRET_KEY}" >> $GITHUB_ENV

      - name: Run tests
        run: pytest --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: i-defranca/mariane-api
          files: ./coverage.xml
          fail_ci_if_error: true

  update-readme-badge:
    needs: changes
    if: needs.changes.outputs.python_version == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Python version
        id: pyver
        run: |
          VERSION=$(cat .python-version | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README badge
        run: |
          BADGE="https://img.shields.io/badge/python-${{ steps.pyver.outputs.version }}-blue"
          sed -i "s|https://img.shields.io/badge/python-.*-blue|$BADGE|g" README.md

          sed -i "s|Python [0-9]\+\.[0-9]\+\(\.[0-9]\+\)\? (with pyenv)|Python ${{ steps.pyver.outputs.version }} (with pyenv)|g" README.md
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update python version badge"
          git push
